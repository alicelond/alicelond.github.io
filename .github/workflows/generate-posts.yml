name: Generate Posts Index

on:
  push:
    branches:
      - main
    paths:
      - 'posts/*.md'
      - '.github/workflows/generate-posts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate posts index
        run: node generate-posts.js

      - name: Check if posts.json changed
        id: git-check
        run: |
          if git diff --quiet posts/posts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated posts.json
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/posts.json
          git commit -m "chore: update posts index [skip ci]"
          git push
