<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #FFFFFF;
            color: #2E2938;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2E2938;
        }

        p {
            font-size: 1.25rem;
            margin-bottom: 30px;
            color: #666666;
        }

        a {
            display: inline-block;
            background-color: #489C9A;
            color: #FFFFFF;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        a:hover {
            background-color: #E0A83F;
            transform: translateY(-2px);
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🔍</div>
        <h1>404</h1>
        <p>Oops! This page doesn't exist.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
